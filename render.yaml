# Render.com blueprint -- one-click deploy from GitHub.
#
# Steps:
#  1. Push this repo to GitHub.
#  2. https://dashboard.render.com -> New -> Blueprint -> connect the repo.
#  3. Render reads this file, provisions a web service + persistent disk.
#  4. Click "Apply".  Live URL in ~3 minutes.

services:
  - type: web
    name: auguspay
    runtime: docker
    region: singapore     # closest free region to India
    plan: free            # 512 MB RAM, sleeps after 15 min idle
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true     # Render auto-generates a strong secret
      - key: DATABASE_URL
        value: sqlite:////data/auguspay.db
      - key: PORT
        value: 8080
    disk:
      name: auguspay-data
      mountPath: /data
      sizeGB: 1

